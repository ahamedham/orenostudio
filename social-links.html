<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080808;
  --fg:      rgba(245, 243, 238, 0.92);
  --muted:   rgba(245, 243, 238, 0.42);
  --border:  rgba(245, 243, 238, 0.09);
  --border-h:rgba(212, 160, 23, 0.45);
  --card-bg: rgba(245, 243, 238, 0.04);
  --card-h:  rgba(245, 243, 238, 0.07);
  --gold:    #d4a017;
  --gold-dim: rgba(212, 160, 23, 0.12);
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--fg);
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: clamp(48px, 8vw, 80px) 20px clamp(40px, 6vw, 60px);
  min-height: 100svh;
}

/* ── Profile ── */
.profile {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  margin-bottom: 44px;
  width: 100%;
}

.logo-wrap {
  width: 72px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
}

.logo-wrap img {
  width: 72px;
  height: auto;
}

.profile-name {
  font-size: 1.35rem;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--fg);
  margin-bottom: 6px;
}

.profile-tag {
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1.6;
}

/* ── Links ── */
.links {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.link-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 18px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  text-decoration: none;
  color: var(--fg);
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.01em;
  transition: background 200ms ease, border-color 200ms ease, transform 160ms ease;
  -webkit-tap-highlight-color: transparent;
}

.link-item:hover {
  background: var(--card-h);
  border-color: var(--border-h);
  transform: translateY(-1px);
}

.link-item:active {
  transform: translateY(0);
}

/* CTA — Start a Project */
.link-item.link-cta {
  background: var(--gold-dim);
  border-color: rgba(212, 160, 23, 0.3);
  color: var(--gold);
}

.link-item.link-cta:hover {
  background: rgba(212, 160, 23, 0.18);
  border-color: rgba(212, 160, 23, 0.6);
}

.link-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: rgba(245, 243, 238, 0.07);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.link-cta .link-icon {
  background: rgba(212, 160, 23, 0.15);
}

.link-icon svg {
  width: 17px;
  height: 17px;
}

.link-label {
  flex: 1;
}

.link-sublabel {
  display: block;
  font-size: 0.67rem;
  font-weight: 400;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.03em;
}

.link-cta .link-sublabel {
  color: rgba(212, 160, 23, 0.65);
}

.link-chevron {
  width: 16px;
  height: 16px;
  color: var(--muted);
  flex-shrink: 0;
}

.link-cta .link-chevron {
  color: rgba(212, 160, 23, 0.55);
}

/* ── Divider ── */
.links-divider {
  width: 100%;
  max-width: 420px;
  height: 1px;
  background: var(--border);
  margin: 6px 0;
}

/* ── Footer ── */
.footer {
  margin-top: auto;
  padding-top: 40px;
  text-align: center;
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(245, 243, 238, 0.22);
}

.footer a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid rgba(245, 243, 238, 0.12);
  transition: color 200ms ease;
}

.footer a:hover {
  color: rgba(245, 243, 238, 0.5);
}

@media (max-width: 420px) {
  .link-item { padding: 13px 15px; gap: 12px; }
  .link-icon { width: 32px; height: 32px; border-radius: 8px; }
  .link-icon svg { width: 15px; height: 15px; }
}
</style>
</head>
